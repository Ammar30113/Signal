name: Deploy GitHub Pages

# Publishes the gh-pages/ directory (landing page, privacy policy, terms)
# to https://ammar30113.github.io/Signal/ — Apple requires these URLs to be
# live before App Store submission.

on:
  push:
    branches: [main]
    paths:
      - "gh-pages/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages
      - id: deployment
        uses: actions/deploy-pages@v4
